 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorful Webpage</title>

    <style>
        body {
            background-color: rgb(226, 228, 229);
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
        }
         
        h1 {
            color: darkblue;
            text-align: center;
            border: 3px solid navy;
            padding: 15px;
            background-color: white;
        }

        .content {
            background-color: lightyellow;
            color: darkgreen;
            font-size: 18px;
            border: 2px solid black;
            margin-top: 20px;
            padding: 20px;
        }

        .footer {
            background-color: orange;
            color: rgb(193, 32, 32);
            text-align: center;
            border: 2px solid black;
            margin-top: 20px;
            padding: 10px;
        }
    </style>
</head>

<body>

    <h1>  Colorful Webpage</h1>

    <div class="content">
        <h2>About CSS</h2>
        <p>
            CSS (Cascading Style Sheets) is used to style and design web pages.
            It controls colors, fonts, spacing, borders, layouts, and many other
            visual aspects of a webpage.
        </p>
    </div>

    <div class="footer">
        <p>© 2026 My Website  <br>
             Designed with HTML & CSS</p>
    </div>

</body>
</html>
