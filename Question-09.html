<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .container {
            width: 450px;
            margin: 30px auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .radio-group {
            margin-bottom: 15px;
        }

        .radio-group input {
            width: auto;
        }

        .btn {
            width: 100%;
            padding: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Student Feedback Form</h2>

    <form>

        <label>Full Name:</label>
        <input type="text" name="name"
               placeholder="Enter your name"
               required>

        <label>Email:</label>
        <input type="email" name="email"
               placeholder="Enter your email"
               required>

        <label>Mobile Number:</label>
        <input type="tel" name="mobile"
               pattern="[0-9]{10}"
               placeholder="10-digit mobile number"
               required>

        <label>Course:</label>
        <select required>
            <option value="">Select Course</option>
            <option>BCA</option>
            <option>B.Sc IT</option>
            <option>MCA</option>
            <option>B.Tech</option>
        </select>

        <label>Rate Our Service:</label>
        <div class="radio-group">
            <input type="radio" name="rating" required> Excellent
            <input type="radio" name="rating"> Good
            <input type="radio" name="rating"> Average
            <input type="radio" name="rating"> Poor
        </div>

        <label>Your Feedback:</label>
        <textarea rows="5"
                  placeholder="Write your feedback here..."
                  required></textarea>

        <input type="submit" value="Submit Feedback" class="btn">

    </form>

</div>

</body>
</html>
