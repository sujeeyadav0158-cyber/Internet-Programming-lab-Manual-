<!DOCTYPE html>
<html>
<head>
    <title>Simple Events</title>
</head>
<body style="font-family:Arial; padding:20px;">

<h2>JavaScript Events Example</h2>

<!-- Click Event -->
<h3>1. Click Event</h3>
<button onclick="clickMe()">Click Me</button>
<p id="c1"></p>

<!-- Mouse Event -->
<h3>2. Mouse Event</h3>
<div onmouseover="mouseIn()" onmouseout="mouseOut()"
     style="background:red; color:white; padding:10px; width:200px;">
    Hover Me
</div>
<p id="c2"></p>

<!-- Keyboard Event -->
<h3>3. Keyboard Event</h3>
<input type="text" onkeyup="keyPress(this)">
<p id="c3"></p>

<!-- Change Event -->
<h3>4. Change Event</h3>
<select onchange="changeVal(this)">
    <option>HTML</option>
    <option>CSS</option>
    <option>JS</option>
</select>
<p id="c4"></p>

<script>
function clickMe() {
    document.getElementById("c1").innerHTML = "Button Clicked!";
}

function mouseIn() {
    document.getElementById("c2").innerHTML = "Mouse Inside";
}

function mouseOut() {
    document.getElementById("c2").innerHTML = "Mouse Outside";
}

function keyPress(e) {
    document.getElementById("c3").innerHTML = e.value;
}

function changeVal(e) {
    document.getElementById("c4").innerHTML = e.value;
}
</script>

</body>
</html>
