<!DOCTYPE html>
<html>
<head>
    <title>Arithmetic Calculator</title>
</head>
<body style="font-family:Arial; text-align:center; padding:20px;">

<h2>Simple Calculator</h2>

<input type="number" id="a" placeholder="First Number"><br><br>

<select id="op">
    <option value="+">+</option>
    <option value="-">-</option>
    <option value="*">*</option>
    <option value="/">/</option>
    <option value="%">%</option>
</select><br><br>

<input type="number" id="b" placeholder="Second Number"><br><br>

<button onclick="calc()">Calculate</button>

<p id="out"></p>

<script>
function calc() {
    let a = Number(document.getElementById("a").value);
    let b = Number(document.getElementById("b").value);
    let op = document.getElementById("op").value;

    let res = 0;

    if (op == "+") res = a + b;
    else if (op == "-") res = a - b;
    else if (op == "*") res = a * b;
    else if (op == "/") res = b != 0 ? a / b : "Cannot divide by zero";
    else if (op == "%") res = a % b;

    document.getElementById("out").innerHTML = "Result: " + res;
}
</script>

</body>
</html>
