<!doctype html>
<html>
  <head>
    <title>Grade Calculator</title>
  </head>
  <body style="font-family: Arial; text-align: center; padding: 20px">
    <h2>Student Grade Calculator</h2>

    <input type="number" id="m1" placeholder="Subject 1" /><br /><br />
    <input type="number" id="m2" placeholder="Subject 2" /><br /><br />
    <input type="number" id="m3" placeholder="Subject 3" /><br /><br />
    <input type="number" id="m4" placeholder="Subject 4" /><br /><br />
    <input type="number" id="m5" placeholder="Subject 5" /><br /><br />

    <button onclick="calc()">Calculate</button>

    <p id="out"></p>

    <script>
      function calc() {
        let a = Number(document.getElementById("m1").value);
        let b = Number(document.getElementById("m2").value);
        let c = Number(document.getElementById("m3").value);
        let d = Number(document.getElementById("m4").value);
        let e = Number(document.getElementById("m5").value);

        let total = a + b + c + d + e;
        let per = total / 5;

        let grade = "";

        if (per >= 90) grade = "A+";
        else if (per >= 80) grade = "A";
        else if (per >= 70) grade = "B";
        else if (per >= 60) grade = "C";
        else if (per >= 50) grade = "D";
        else grade = "F";

        document.getElementById("out").innerHTML =
          "Total: " +
          total +
          "<br>Percentage: " +
          per.toFixed(2) +
          "%<br>Grade: " +
          grade;
      }
    </script>
  </body>
</html>
