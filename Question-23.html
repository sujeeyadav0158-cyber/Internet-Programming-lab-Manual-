<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Percentage & Grade Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 30px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            border-bottom: 2px solid #2ecc71;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #34495e;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            background-color: #2ecc71;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #27ae60;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            background-color: #eef9f1;
            border-left: 5px solid #2ecc71;
            display: none;
        }
        .error {
            color: #e74c3c;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Grade Calculator</h2>
    <p style="text-align: center; color: #7f8c8d; font-size: 0.9em;">Enter marks obtained out of 100</p>
    
    <div class="form-group">
        <label for="sub1">Web Technologies:</label>
        <input type="number" id="sub1" min="0" max="100" placeholder="e.g. 85">
    </div>
    <div class="form-group">
        <label for="sub2">Database Systems:</label>
        <input type="number" id="sub2" min="0" max="100" placeholder="e.g. 78">
    </div>
    <div class="form-group">
        <label for="sub3">Software Engineering:</label>
        <input type="number" id="sub3" min="0" max="100" placeholder="e.g. 92">
    </div>
    <div class="form-group">
        <label for="sub4">Computer Networks:</label>
        <input type="number" id="sub4" min="0" max="100" placeholder="e.g. 64">
    </div>
    <div class="form-group">
        <label for="sub5">Cyber Security:</label>
        <input type="number" id="sub5" min="0" max="100" placeholder="e.g. 81">
    </div>

    <button onclick="calculateGrade()">Calculate Results</button>
    
    <div id="error-message" class="error"></div>

    <div id="result" class="result-box">
        <p><strong>Total Marks:</strong> <span id="txtTotal"></span> / 500</p>
        <p><strong>Percentage:</strong> <span id="txtPercentage"></span>%</p>
        <p><strong>Final Grade:</strong> <span id="txtGrade" style="color: #27ae60;"></span></p>
    </div>
</div>

<script>
function calculateGrade() {
     
    const errorDiv = document.getElementById("error-message");
    const resultDiv = document.getElementById("result");
    errorDiv.innerHTML = "";
    resultDiv.style.display = "none";

    
    const s1 = document.getElementById("sub1").value;
    const s2 = document.getElementById("sub2").value;
    const s3 = document.getElementById("sub3").value;
    const s4 = document.getElementById("sub4").value;
    const s5 = document.getElementById("sub5").value;

   
    if (s1 === "" || s2 === "" || s3 === "" || s4 === "" || s5 === "") {
        errorDiv.innerHTML = "Please enter marks for all 5 subjects.";
        return;
    }

    
    const marks = [parseFloat(s1), parseFloat(s2), parseFloat(s3), parseFloat(s4), parseFloat(s5)];

     
    for (let i = 0; i < marks.length; i++) {
        if (marks[i] < 0 || marks[i] > 100 || isNaN(marks[i])) {
            errorDiv.innerHTML = "Marks must be a valid number between 0 and 100.";
            return;
        }
    }
 
    const totalMarks = marks[0] + marks[1] + marks[2] + marks[3] + marks[4];
    const percentage = (totalMarks / 500) * 100;
    let grade = "";

    
    if (percentage >= 90) {
        grade = "A+ (Excellent)";
    } else if (percentage >= 80) {
        grade = "A (Very Good)";
    } else if (percentage >= 70) {
        grade = "B (Good)";
    } else if (percentage >= 60) {
        grade = "C (Fair)";
    } else if (percentage >= 50) {
        grade = "D (Pass)";
    } else {
        grade = "F (Fail)";
    }

 
    document.getElementById("txtTotal").innerText = totalMarks;
    document.getElementById("txtPercentage").innerText = percentage.toFixed(2);
    document.getElementById("txtGrade").innerText = grade;

 
    resultDiv.style.display = "block";
}
</script>

</body>
</html>
