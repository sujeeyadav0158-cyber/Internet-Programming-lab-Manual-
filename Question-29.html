<!DOCTYPE html>
<html>
<head>
    <title>Simple Array Operations</title>
</head>
<body>

<h2>Array Operations</h2>

<input type="text" id="item" placeholder="Enter item">
<input type="number" id="index" placeholder="Enter index">

<br><br>

<button onclick="addItem()">Add</button>
<button onclick="showItem()">Show</button>
<button onclick="updateItem()">Update</button>
<button onclick="deleteItem()">Delete</button>

<h3>Array:</h3>
<p id="output"></p>

<script>
    let arr = ["HTML", "CSS", "JS"];

    function showArray() {
        document.getElementById("output").innerHTML = arr;
    }

    function addItem() {
        let val = document.getElementById("item").value;
        arr.push(val);
        showArray();
    }

    function showItem() {
        let i = document.getElementById("index").value;
        alert(arr[i]);
    }

    function updateItem() {
        let i = document.getElementById("index").value;
        let val = document.getElementById("item").value;
        arr[i] = val;
        showArray();
    }

    function deleteItem() {
        let i = document.getElementById("index").value;
        arr.splice(i, 1);
        showArray();
    }

    showArray();
</script>

</body>
</html>
