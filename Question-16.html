 <!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>
    <style>
        body{
            text-align:center;
            font-family:Arial;
        }

        .gallery img{
            width:200px;
            height:150px;
            margin:10px;
            border:2px solid black;
            transition:0.5s;
        }

        .gallery img:hover{
            transform:scale(1.1);
            border-color:blue;
        }
    </style>
</head>
<body>

    <h2>Image Gallery</h2>

    <div class="gallery">
        <img src="https://lh6.googleusercontent.com/proxy/XlEdGDz0eTCejgtsdoiWDju99-ZzQ3NIH8lOcVxBbujz0VuWZ8XcYp29XD7kAFWZvKld3UCYKr-ZELp4uocAYCpP0r3fFeyTdG_F7lo" alt="Image 1"> <br>
        <img src="https://campuspro.co.in/collage-image/1749457750_row_48.jpg" alt="Image 2"><br>
        <img src="https://i.ytimg.com/vi/m_htZUAC-sw/hqdefault.jpg" alt="Image 3"> <br>
        <img src="https://eduvow.com/images/college/318_jhar.jpg" alt="Image 4">
    </div>

</body>
</html>
