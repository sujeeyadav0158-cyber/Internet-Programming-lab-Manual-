<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 30: Simple Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f3f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Calculator Container */
        .calculator {
            background-color: #2c3e50;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            width: 320px;
        }

        h3 {
            color: #ecf0f1;
            text-align: center;
            margin-top: 0;
            margin-bottom: 15px;
            font-weight: 400;
            letter-spacing: 1px;
            font-size: 1.1rem;
        }

        /* Display Screen Layout */
        .display-screen {
            background-color: #bdc3c7;
            width: 100%;
            height: 60px;
            border: none;
            border-radius: 6px;
            margin-bottom: 20px;
            padding: 10px;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.8rem;
            color: #2c3e50;
            text-align: right;
        }

        /* Button Grid Layout Configuration */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 18px 0;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.1s ease, transform 0.05s ease;
            background-color: #ecf0f1;
            color: #2c3e50;
        }

        button:active {
            transform: scale(0.95);
        }

        
        button.operator {
            background-color: #e67e22;
            color: #ffffff;
        }

        button.operator:hover {
            background-color: #d35400;
        }

        button.clear {
            background-color: #e74c3c;
            color: #ffffff;
        }

        button.clear:hover {
            background-color: #c0392b;
        }

        button.equal {
            background-color: #2ecc71;
            color: #ffffff;
            grid-column: span 2; /* Spans across two column grids */
        }

        button.equal:hover {
            background-color: #27ae60;
        }

        button:hover:not(.operator):not(.clear):not(.equal) {
            background-color: #d5dbdb;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <h3>SIMPLE CALCULATOR</h3>
        <input type="text" id="screen" class="display-screen" value="0" readonly>
        
        <div class="buttons-grid">
            <button class="clear" onclick="clearScreen()">C</button>
            <button onclick="appendValue('/')" class="operator">÷</button>
            <button onclick="appendValue('*')" class="operator">×</button>
            <button onclick="deleteLastCharacter()" class="clear">⌫</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('-')" class="operator">-</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('+')" class="operator">+</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('.')">.</button>

            <button onclick="appendValue('0')">0</button>
            <button onclick="calculateResult()" class="equal">=</button>
        </div>
    </div>

<script>
    const screen = document.getElementById('screen');
    let shouldResetScreen = false;

    
    function appendValue(value) {
      
        if (screen.value === '0' || shouldResetScreen) {
            if (isNaN(value) && value !== '.' && !shouldResetScreen) {
                 
                screen.value += value;
            } else {
                screen.value = value;
            }
            shouldResetScreen = false;
        } else {
            screen.value += value;
        }
    }

    
    function clearScreen() {
        screen.value = '0';
        shouldResetScreen = false;
    }

     
    function deleteLastCharacter() {
        if (screen.value.length > 1 && screen.value !== 'Error') {
            screen.value = screen.value.slice(0, -1);
        } else {
            screen.value = '0';
        }
    }

     
    function calculateResult() {
        try {
            
            if (screen.value === '' || screen.value === 'Error') return;
            
             
            let expression = screen.value;
            let result = Function(`"use strict"; return (${expression})`)();
            
           
            if (result % 1 !== 0) {
                result = parseFloat(result.toFixed(4));
            }
            
            screen.value = result;
            shouldResetScreen = true;
        } catch (error) {
            screen.value = 'Error';
            shouldResetScreen = true;
        }
    }
</script>

</body>
</html>
