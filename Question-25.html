<!DOCTYPE html>
<html>
<head>
    <title>Multiplication Table</title>
</head>
<body style="font-family:Arial; padding:20px;">

<h2>Multiplication Table Generator</h2>

<input type="number" id="num" placeholder="Enter number">
<button onclick="generate()">Generate</button>

<p id="error" style="color:red;"></p>

<h3>For Loop</h3>
<p id="for"></p>

<h3>While Loop</h3>
<p id="while"></p>

<h3>Do While Loop</h3>
<p id="do"></p>

<script>
function generate() {
    let n = document.getElementById("num").value;

    if (n === "") {
        document.getElementById("error").innerHTML = "Enter a number";
        return;
    }

    n = parseInt(n);

    let f = "", w = "", d = "";

    // for loop
    for (let i = 1; i <= 10; i++) {
        f += n + " x " + i + " = " + (n*i) + "<br>";
    }

    // while loop
    let j = 1;
    while (j <= 10) {
        w += n + " x " + j + " = " + (n*j) + "<br>";
        j++;
    }

    // do while loop
    let k = 1;
    do {
        d += n + " x " + k + " = " + (n*k) + "<br>";
        k++;
    } while (k <= 10);

    document.getElementById("for").innerHTML = f;
    document.getElementById("while").innerHTML = w;
    document.getElementById("do").innerHTML = d;

    document.getElementById("error").innerHTML = "";
}
</script>

</body>
</html>
</html>
