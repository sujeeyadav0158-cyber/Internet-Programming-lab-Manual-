<!DOCTYPE html>
<html>
<head>
    <title>Factorial & Fibonacci</title>
</head>
<body>

<h2>Factorial & Fibonacci Program</h2>
 
<h3>Factorial</h3>
<input type="number" id="num" placeholder="Enter number">
<button onclick="factorial()">Find Factorial</button>
<p id="factResult"></p>

 
<h3>Fibonacci</h3>
<input type="number" id="terms" placeholder="Enter terms">
<button onclick="fibonacci()">Generate Series</button>
<p id="fibResult"></p>

<script>
function factorial() {
    let n = document.getElementById("num").value;
    let fact = 1;

    for (let i = 1; i <= n; i++) {
        fact = fact * i;
    }

    document.getElementById("factResult").innerHTML = "Factorial = " + fact;
}

function fibonacci() {
    let n = document.getElementById("terms").value;

    let a = 0, b = 1;
    let result = "";

    for (let i = 1; i <= n; i++) {
        result = result + a + " ";
        let next = a + b;
        a = b;
        b = next;
    }

    document.getElementById("fibResult").innerHTML =
        "Fibonacci Series: " + result;
}
</script>

</body>
</html>
</html>
