<!DOCTYPE html>
<html>
<head>
    <title>Simple Area Calculator</title>
</head>
<body>

<h2>Area Calculator</h2>

 
<h3>Rectangle</h3>
Length: <input type="number" id="len"><br><br>
Width: <input type="number" id="wid"><br><br>
<button onclick="rect()">Calculate Rectangle</button>
<p id="r1"></p>

 
<h3>Circle</h3>
Radius: <input type="number" id="rad"><br><br>
<button onclick="circle()">Calculate Circle</button>
<p id="r2"></p>

<script>
    
    function rectangleArea(l, w) {
        return l * w;
    }

    function circleArea(r) {
        return 3.14 * r * r;
    }

    function rect() {
        let l = document.getElementById("len").value;
        let w = document.getElementById("wid").value;

        let result = rectangleArea(l, w);
        document.getElementById("r1").innerHTML = "Area = " + result;
    }

    function circle() {
        let r = document.getElementById("rad").value;

        let result = circleArea(r);
        document.getElementById("r2").innerHTML = "Area = " + result;
    }
</script>

</body>
</html>
