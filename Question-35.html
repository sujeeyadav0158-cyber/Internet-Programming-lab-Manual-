<!DOCTYPE html>
<html>
<head>
    <title>Simple Quiz</title>
</head>
<body style="font-family:Arial; padding:20px;">

<h2>Simple Quiz</h2>

<form id="quiz">

<p>1. CSS full form?</p>
<input type="radio" name="q1" value="c"> Cascading Style Sheets<br>
<input type="radio" name="q1" value="w"> Wrong Option<br><br>

<p>2. HTML tag for CSS?</p>
<input type="radio" name="q2" value="style"> style<br>
<input type="radio" name="q2" value="script"> script<br><br>

<p>3. JS output method?</p>
<input type="radio" name="q3" value="write"> document.write<br>
<input type="radio" name="q3" value="log"> console.log<br><br>

<button type="button" onclick="check()">Submit</button>

</form>

<p id="result"></p>

<script>
function check() {
    let score = 0;

    if (document.querySelector('input[name="q1"]:checked')?.value == "c") score++;
    if (document.querySelector('input[name="q2"]:checked')?.value == "style") score++;
    if (document.querySelector('input[name="q3"]:checked')?.value == "write") score++;

    document.getElementById("result").innerHTML = 
        "Score: " + score + " / 3";
}
</script>

</body>
</html>
