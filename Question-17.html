<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form</title>

    <style>

        body{

            font-family: Arial, sans-serif;

            background: lightgray;

        }

        .login-box{

            width: 300px;

            margin: 100px auto;

            padding: 20px;

            background: white;

            border-radius: 10px;

            text-align: center;

        }

        input{

            width: 90%;

            padding: 10px;

            margin: 10px 0;

        }

        button{

            width: 100%;

            padding: 10px;

            background: blue;

            color: white;

            border: none;

            cursor: pointer;

        }

        button:hover{

            background: rgb(12, 139, 0);

        }

    </style>

</head>

<body>

<div class="login-box">

    <h2>Login</h2>

    <form>

        <input type="text" placeholder="Username" required><br>

        <input type="password" placeholder="Password" required><br>

        <button type="submit">Login</button>

    </form>

</div>

</body>

</html>
