<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
    <title>Navigation Menu</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .navbar {
            background-color: #ae5151;
            overflow: hidden;
        }

        .navbar a {
            float: left;
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            font-size: 18px;
        }

        .navbar a:hover {
            background-color: #d90ed2;
            color: white;
        }

        h2 {
            text-align: center;
            margin-top: 40px;
        }

        p {
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Courses</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
    </div>

    <h2>Welcome to Our Website</h2>
    <p>Hover over the menu items to see the CSS hover effect.</p>

</body>
</html>
