<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
    <title>Animation and Transformation</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
            background-color: blue;
            margin: 100px auto;
            animation: move 3s infinite;
        }

        .box:hover {
            transform: rotate(45deg) scale(1.2);
        }

        @keyframes move {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(200px);
            }
        }
    </style>
</head>
<body>

    <h2  >CSS Animation and Transformation</h2>

    <div class="box"></div>

</body>
</html>
